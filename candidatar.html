<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Candidatar-se - EU RH
  </title>
  <link href="css/style.css" rel="stylesheet"/>
 </head>
 <body>
  <header>
   <div class="topo">
    <a class="logo" href="index.html">
     <span class="logo-box">
      EU
     </span>
     <span>
      EU RH
     </span>
    </a>
    <nav>
     <ul>
      <li>
       <a href="index.html">
        In&iacute;cio
       </a>
      </li>
      <li>
       <a href="index.html#sobre">
        Sobre N&oacute;s
       </a>
      </li>
      <li>
       <a href="vagas.html">
        Vagas
       </a>
      </li>
      <li>
       <a class="btn-nav" href="login.html">
        Entrar
       </a>
      </li>
     </ul>
    </nav>
   </div>
  </header>
  <main class="container">
   <section class="hero">
    <h1>
     Candidatar-se
    </h1>
    <p>
     Vaga: Analista de RH. Preencha os dados abaixo para simular o envio de candidatura.
    </p>
   </section>
   <section class="form-box">
    <h2 class="form-title">
     Dados do candidato
    </h2>
    <div class="duas-colunas">
     <div class="grupo">
      <label>
       Nome completo
      </label>
      <input placeholder="Seu nome"/>
     </div>
     <div class="grupo">
      <label>
       E-mail
      </label>
      <input placeholder="seu@email.com"/>
     </div>
    </div>
    <div class="duas-colunas">
     <div class="grupo">
      <label>
       Telefone
      </label>
      <input placeholder="(51) 99999-9999"/>
     </div>
     <div class="grupo">
      <label>
       Cidade/Estado
      </label>
      <input placeholder="Porto Alegre - RS"/>
     </div>
    </div>
    <div class="duas-colunas">
     <div class="grupo">
      <label>
       Escolaridade
      </label>
      <input placeholder="Ensino superior"/>
     </div>
     <div class="grupo">
      <label>
       Pretens&atilde;o salarial
      </label>
      <input placeholder="R$ 3.500"/>
     </div>
    </div>
    <div class="grupo">
     <label>
      Experi&ecirc;ncia
     </label>
     <textarea placeholder="Conte um resumo da sua experi&ecirc;ncia profissional"></textarea>
    </div>
    <div class="grupo">
     <label>
      Curr&iacute;culo
     </label>
     <input type="file"/>
    </div>
    <a class="btn btn-primary" href="sucesso.html">
     Enviar candidatura
    </a>
   </section>
  </main>
 </body>
</html>
