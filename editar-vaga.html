<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Editar vaga - EU RH
  </title>
  <link href="css/style.css" rel="stylesheet"/>
 </head>
 <body>
  <header>
   <div class="topo">
    <a class="logo" href="index.html">
     <span class="logo-box">
      EU
     </span>
     <span>
      EU RH
     </span>
    </a>
    <nav>
     <ul>
      <li>
       <a href="index.html">
        In&iacute;cio
       </a>
      </li>
      <li>
       <a href="index.html#sobre">
        Sobre N&oacute;s
       </a>
      </li>
      <li>
       <a href="vagas.html">
        Vagas
       </a>
      </li>
      <li>
       <a class="btn-nav" href="login.html">
        Entrar
       </a>
      </li>
     </ul>
    </nav>
   </div>
  </header>
  <main class="container">
   <section class="hero">
    <h1>
     Editar vaga
    </h1>
    <p>
     Preencha as informa&ccedil;&otilde;es principais da vaga para apresenta&ccedil;&atilde;o no sistema.
    </p>
   </section>
   <section class="form-box">
    <h2 class="form-title">
     Informa&ccedil;&otilde;es da vaga
    </h2>
    <div class="grupo">
     <label>
      T&iacute;tulo da vaga
     </label>
     <input value="Analista de RH"/>
    </div>
    <div class="grupo">
     <label>
      Descri&ccedil;&atilde;o
     </label>
     <textarea>Atuar no processo de recrutamento e sele&ccedil;&atilde;o, triagem de curr&iacute;culos, contato com candidatos e apoio ao setor de pessoas.</textarea>
    </div>
    <div class="duas-colunas">
     <div class="grupo">
      <label>
       Setor
      </label>
      <input value="Recursos Humanos"/>
     </div>
     <div class="grupo">
      <label>
       Sal&aacute;rio
      </label>
      <input value="3500"/>
     </div>
    </div>
    <div class="duas-colunas">
     <div class="grupo">
      <label>
       Tipo de contrato
      </label>
      <select>
       <option>
        CLT
       </option>
       <option>
        PJ
       </option>
       <option>
        Est&aacute;gio
       </option>
      </select>
     </div>
     <div class="grupo">
      <label>
       Modelo
      </label>
      <select>
       <option>
        H&iacute;brido
       </option>
       <option>
        Presencial
       </option>
       <option>
        Home office
       </option>
      </select>
     </div>
    </div>
    <div class="duas-colunas">
     <div class="grupo">
      <label>
       Localiza&ccedil;&atilde;o
      </label>
      <input value="Porto Alegre - RS"/>
     </div>
     <div class="grupo">
      <label>
       Turno
      </label>
      <select>
       <option>
        Comercial
       </option>
       <option>
        Manh&atilde;
       </option>
       <option>
        Noite
       </option>
      </select>
     </div>
    </div>
    <div class="actions">
     <a class="btn btn-primary" href="dashboard.html">
      Salvar altera&ccedil;&otilde;es
     </a>
     <a class="btn btn-muted" href="dashboard.html">
      Cancelar
     </a>
    </div>
   </section>
  </main>
