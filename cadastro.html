<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Cadastro - EU RH
  </title>
  <link href="css/style.css" rel="stylesheet"/>
 </head>
 <body>
  <header>
   <div class="topo">
    <a class="logo" href="index.html">
     <span class="logo-box">
      EU
     </span>
     <span>
      EU RH
     </span>
    </a>
    <nav>
     <ul>
      <li>
       <a href="index.html">
        In&iacute;cio
       </a>
      </li>
      <li>
       <a href="index.html#sobre">
        Sobre N&oacute;s
       </a>
      </li>
      <li>
       <a href="vagas.html">
        Vagas
       </a>
      </li>
      <li>
       <a class="btn-nav" href="login.html">
        Entrar
       </a>
      </li>
     </ul>
    </nav>
   </div>
  </header>
  <main class="container">
   <section class="hero">
    <h1>
     Cadastro de empresa
    </h1>
    <p>
     Crie uma conta demonstrativa para acessar o ambiente visual do EU RH.
    </p>
   </section>
   <section class="form-box">
    <h2 class="form-title">
     Dados da empresa
    </h2>
    <p class="text-muted">
     Formul&aacute;rio somente visual nesta vers&atilde;o HTML/CSS.
    </p>
    <div class="grupo">
     <label>
      Nome da empresa
     </label>
     <input placeholder="Ex: Soluway Tecnologia"/>
    </div>
    <div class="duas-colunas">
     <div class="grupo">
      <label>
       E-mail
      </label>
      <input placeholder="empresa@email.com"/>
     </div>
     <div class="grupo">
      <label>
       Telefone
      </label>
      <input placeholder="(51) 99999-9999"/>
     </div>
    </div>
    <div class="duas-colunas">
     <div class="grupo">
      <label>
       Senha
      </label>
      <input type="password"/>
     </div>
     <div class="grupo">
      <label>
       Confirmar senha
      </label>
      <input type="password"/>
     </div>
    </div>
    <a class="btn btn-primary" href="dashboard.html">
     Cadastrar e acessar
    </a>
   </section>
  </main>
 </body>
</html>
